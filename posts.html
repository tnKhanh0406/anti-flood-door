<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bài viết - NGUYÊN PHÚ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/index.css">
</head>
<body class="bg-light" data-page="posts">
  <div class="page-shell">
    <div data-layout="header"></div>

    <main class="container py-4 py-lg-5">
      <div class="d-flex flex-column flex-md-row justify-content-between gap-3 align-items-md-center mb-4">
        <div>
          <p class="text-uppercase text-secondary fw-semibold mb-1">Tin tức &amp; công trình</p>
          <h1 class="h2 mb-0">Bài viết đã đăng</h1>
        </div>
        <a class="btn btn-outline-primary" href="index.html"><i class="bi bi-house me-2"></i>Về trang chủ</a>
      </div>

      <div id="postsStatus" class="alert alert-info" role="alert">Đang tải bài viết...</div>
      <div class="row g-4" id="postsGrid"></div>
      <nav class="mt-4" id="postsPagination" aria-label="Phân trang bài viết"></nav>
    </main>

    <div data-layout="footer"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./js/layout.js"></script>
  <script type="module" src="./js/posts.js"></script>
</body>
</html>
