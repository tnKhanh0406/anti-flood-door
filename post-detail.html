<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chi tiết bài viết - NGUYÊN PHÚ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/index.css">
</head>
<body class="bg-light" data-page="post-detail">
  <div class="page-shell">
    <div data-layout="header"></div>

    <main class="container py-4 py-lg-5">
      <a class="text-decoration-none d-inline-flex align-items-center gap-2 mb-3" href="posts.html">
        <i class="bi bi-arrow-left"></i>
        Quay lại danh sách bài viết
      </a>
      <div id="postStatus" class="alert alert-info" role="alert">Đang tải bài viết...</div>
      <article id="postDetail" class="card shadow-sm overflow-hidden" hidden>
        <img id="postThumbnail" class="img-fluid w-100" alt="">
        <div class="card-body p-4 p-lg-5">
          <p id="postMeta" class="text-uppercase text-secondary fw-semibold small mb-2"></p>
          <h1 id="postTitle" class="h2 mb-3"></h1>
          <p id="postSummary" class="lead text-muted"></p>
          <div id="postContent" class="post-content mt-4"></div>
        </div>
      </article>
    </main>

    <div data-layout="footer"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./js/layout.js"></script>
  <script type="module" src="./js/post-detail.js"></script>
</body>
</html>
