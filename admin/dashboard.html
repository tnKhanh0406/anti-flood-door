<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - NGUYÊN PHÚ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <main class="container py-4 py-lg-5" data-dashboard-root>
    <div class="d-flex flex-column flex-lg-row justify-content-between gap-3 align-items-lg-center mb-4">
      <div>
        <p class="text-uppercase text-secondary fw-semibold mb-1">Admin dashboard</p>
        <h1 class="h3 mb-1">Quản lý bài viết</h1>
      </div>
      <div class="d-flex flex-wrap gap-2">
        <a class="btn btn-primary" href="create-post.html"><i class="bi bi-plus-lg me-2"></i>Đăng bài mới</a>
        <button class="btn btn-outline-secondary" id="refreshPosts" type="button"><i class="bi bi-arrow-clockwise me-2"></i>Tải lại</button>
        <button class="btn btn-outline-danger" id="signOutButton" type="button">Đăng xuất</button>
      </div>
    </div>

    <div id="authStatus" class="alert alert-info mb-4" role="alert">Đang kiểm tra đăng nhập...</div>

    <div class="row g-3 mb-4">
      <div class="col-6 col-lg-3">
        <div class="card shadow-sm h-100">
          <div class="card-body">
            <div class="text-muted small">Tổng bài viết</div>
            <div class="display-6 fw-semibold mb-0" id="postCount">0</div>
          </div>
        </div>
      </div>
      <div class="col-6 col-lg-3">
        <div class="card shadow-sm h-100">
          <div class="card-body">
            <div class="text-muted small">Đã publish</div>
            <div class="display-6 fw-semibold mb-0 text-success" id="publishedCount">0</div>
          </div>
        </div>
      </div>
      <div class="col-6 col-lg-3">
        <div class="card shadow-sm h-100">
          <div class="card-body">
            <div class="text-muted small">Bản nháp</div>
            <div class="display-6 fw-semibold mb-0 text-secondary" id="draftCount">0</div>
          </div>
        </div>
      </div>
      <div class="col-6 col-lg-3">
        <div class="card shadow-sm h-100">
          <div class="card-body">
            <div class="text-muted small">Cập nhật gần nhất</div>
            <div class="fw-semibold mb-0" id="lastUpdated">-</div>
          </div>
        </div>
      </div>
    </div>

    <div class="card shadow-sm">
      <div class="card-header bg-white d-flex justify-content-between align-items-center">
        <h2 class="h5 mb-0">Danh sách bài viết</h2>
        <a class="small text-decoration-none" href="../posts.html" target="_blank" rel="noreferrer">Xem trang public</a>
      </div>
      <div class="table-responsive">
        <table class="table align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th scope="col">Ảnh</th>
              <th scope="col">Tiêu đề</th>
              <th scope="col">Trạng thái</th>
              <th scope="col">Tạo lúc</th>
              <th scope="col">Cập nhật</th>
              <th scope="col" class="text-end">Thao tác</th>
            </tr>
          </thead>
          <tbody id="postsTableBody"></tbody>
        </table>
      </div>
      <div class="p-4 text-center text-muted" id="postsEmptyState" hidden>Chưa có bài viết nào.</div>
    </div>
  </main>

  <script type="module" src="../js/dashboard.js"></script>
</body>
</html>
