<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng bài mới - NGUYÊN PHÚ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    .tox-tinymce {
      min-height: 320px;
    }
  </style>
</head>
<body class="bg-light">
  <main class="container py-4 py-lg-5" data-create-post-form>
    <div class="d-flex flex-column flex-lg-row justify-content-between gap-3 align-items-lg-center mb-4">
      <div>
        <a href="dashboard.html" class="text-decoration-none d-inline-flex align-items-center gap-2 mb-3">
          <i class="bi bi-arrow-left"></i>
          Quay về dashboard
        </a>
        <h1 class="h3 mb-2">Đăng bài mới</h1>
      </div>
      <a class="btn btn-outline-secondary" href="../posts.html" target="_blank" rel="noreferrer">
        <i class="bi bi-box-arrow-up-right me-2"></i>
        Xem trang public
      </a>
    </div>

    <div id="formStatus" class="alert alert-info mb-4" role="alert" hidden></div>

    <form id="createPostForm" class="card shadow-sm" novalidate>
      <div class="card-body p-4">
        <div class="row g-3">
          <div class="col-12">
            <label class="form-label" for="title">Tiêu đề</label>
            <input class="form-control" id="title" name="title" type="text" required>
          </div>

          <div class="col-12">
            <label class="form-label" for="slug">Slug</label>
            <input class="form-control" id="slug" name="slug" type="text" placeholder="tu-dong-tao-neu-bo-trong" required>
            <div class="form-text">Slug chỉ nên gồm chữ thường, số và dấu gạch ngang.</div>
          </div>

          <div class="col-12">
            <label class="form-label" for="summary">Tóm tắt</label>
            <textarea class="form-control" id="summary" name="summary" rows="3"></textarea>
          </div>

          <div class="col-12">
            <label class="form-label" for="content_html">Nội dung bài viết</label>
            <textarea class="form-control" id="content_html" name="content_html" rows="12"></textarea>
            <div class="form-text">Có thể bấm nút ảnh hoặc kéo thả ảnh vào nội dung.</div>
          </div>

          <div class="col-12 col-lg-6">
            <label class="form-label" for="thumbnail">Ảnh thumbnail</label>
            <input class="form-control" id="thumbnail" name="thumbnail" type="file" accept="image/*">
          </div>

          <div class="col-12 col-lg-6">
            <label class="form-label" for="status">Trạng thái</label>
            <select class="form-select" id="status" name="status">
              <option value="published" selected>Published</option>
              <option value="draft">Draft</option>
            </select>
          </div>
        </div>
      </div>

      <div class="card-footer bg-white d-flex flex-wrap justify-content-end gap-2">
        <button class="btn btn-primary" id="submitPostButton" type="submit">
          <i class="bi bi-cloud-upload me-2"></i>
          Lưu bài viết
        </button>
      </div>
    </form>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/tinymce@7/tinymce.min.js" referrerpolicy="origin"></script>
  <script type="module" src="../js/create-post.js"></script>
</body>
</html>
