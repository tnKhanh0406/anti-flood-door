<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng bài mới - NGUYÊN PHÚ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <main class="container py-4 py-lg-5" data-create-post-form>
    <div class="mb-4">
      <a href="dashboard.html" class="text-decoration-none">&larr; Quay về dashboard</a>
      <h1 class="h3 mt-3 mb-2">Đăng bài mới</h1>
      <p class="text-muted mb-0">Chưa dùng CKEditor, nội dung nhập bằng HTML thô trong textarea.</p>
    </div>

    <div id="formStatus" class="alert alert-info mb-4" role="alert" hidden></div>

    <form id="createPostForm" class="card shadow-sm">
      <div class="card-body p-4">
        <div class="row g-3">
          <div class="col-12">
            <label class="form-label" for="title">Tiêu đề</label>
            <input class="form-control" id="title" name="title" type="text" required>
          </div>

          <div class="col-12">
            <label class="form-label" for="slug">Slug</label>
            <input class="form-control" id="slug" name="slug" type="text" placeholder="tu-dong-tao-neu-bo-trong" required>
          </div>

          <div class="col-12">
            <label class="form-label" for="summary">Tóm tắt</label>
            <textarea class="form-control" id="summary" name="summary" rows="3"></textarea>
          </div>

          <div class="col-12">
            <label class="form-label" for="content_html">Nội dung HTML</label>
            <textarea class="form-control" id="content_html" name="content_html" rows="12" placeholder="<p>Nội dung bài viết...</p>"></textarea>
          </div>

          <div class="col-12 col-lg-6">
            <label class="form-label" for="thumbnail">Ảnh thumbnail</label>
            <input class="form-control" id="thumbnail" name="thumbnail" type="file" accept="image/*">
            <div class="form-text">Ảnh sẽ được upload lên Cloudinary.</div>
          </div>

          <div class="col-12 col-lg-6">
            <label class="form-label" for="status">Trạng thái</label>
            <select class="form-select" id="status" name="status">
              <option value="published" selected>Published</option>
              <option value="draft">Draft</option>
            </select>
          </div>
        </div>
      </div>

      <div class="card-footer bg-white d-flex flex-wrap justify-content-end gap-2">
        <button class="btn btn-primary" id="submitPostButton" type="submit">Lưu bài viết</button>
      </div>
    </form>
  </main>

  <script type="module" src="../js/create-post.js"></script>
</body>
</html>
