<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập admin - NGUYÊN PHÚ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <main class="container min-vh-100 d-flex align-items-center justify-content-center py-4">
    <section class="card shadow-sm border-0" style="width: min(100%, 430px);">
      <div class="card-body p-4 p-lg-5">
        <a class="text-decoration-none d-inline-flex align-items-center gap-2 mb-4" href="../index.html">
          <i class="bi bi-arrow-left"></i>
          Về trang chủ
        </a>

        <p class="text-uppercase text-secondary fw-semibold small mb-2">Admin</p>
        <h1 class="h3 mb-2">Đăng nhập quản trị</h1>

        <div id="loginStatus" class="alert alert-info mb-4" role="alert" hidden></div>

        <form id="loginForm" novalidate>
          <div class="mb-3">
            <label class="form-label" for="email">Email</label>
            <input class="form-control" id="email" name="email" type="email" autocomplete="email" required>
          </div>

          <div class="mb-4">
            <label class="form-label" for="password">Mật khẩu</label>
            <input class="form-control" id="password" name="password" type="password" autocomplete="current-password" required>
          </div>

          <button class="btn btn-primary w-100" id="loginButton" type="submit">
            <i class="bi bi-box-arrow-in-right me-2"></i>
            Đăng nhập
          </button>
        </form>
      </div>
    </section>
  </main>

  <script type="module" src="../js/login.js"></script>
</body>
</html>
